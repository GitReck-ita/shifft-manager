<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShiftManager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] text-slate-900 min-h-screen pb-24 md:pb-10">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-start">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-md">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <h1 class="font-bold text-lg tracking-tight">ShiftManager <span class="text-blue-600">Pro</span></h1>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200 w-full sm:w-auto">
                <button onclick="switchTab('logistica')" id="nav-logistica" class="flex-1 px-4 py-2.5 rounded-lg text-xs font-bold transition-all bg-white text-blue-600 shadow-sm border border-slate-200">LOGISTICA</button>
                <button onclick="switchTab('pianificazione')" id="nav-pianificazione" class="flex-1 px-4 py-2.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-900 border border-transparent">PIANIFICAZIONE</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 md:py-10">
        
        <div id="tab-logistica" class="space-y-6 md:space-y-10 animate-fade">
            <div class="bg-white rounded-2xl p-5 md:p-8 border border-slate-200 shadow-sm">
                <h2 class="text-xs md:text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 md:mb-8 text-center">Fabbisogno per Giorno</h2>
                <div class="grid grid-cols-4 md:grid-cols-7 gap-3 md:gap-6" id="config-posti-container"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-10">
                <div class="lg:col-span-4">
                    <div class="bg-white rounded-2xl p-5 md:p-8 border border-slate-200 shadow-sm space-y-6 md:space-y-8" id="form-container">
                        <h2 class="text-xs md:text-sm font-bold text-slate-400 uppercase tracking-widest" id="form-title">Nuova Risorsa</h2>
                        <div class="space-y-4 md:space-y-5">
                            <input type="text" id="worker-name" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 md:p-3.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none text-sm font-medium" placeholder="Es. Alessandro Rossi">
                            
                            <div onclick="toggleSwitch('contract')" class="flex items-center justify-between p-3.5 md:p-4 bg-slate-50 rounded-xl border border-slate-200 cursor-pointer hover:border-slate-300 transition-all">
                                <span class="text-sm font-semibold text-slate-700 select-none">Contratto</span>
                                <button id="btn-contract" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-300 transition-colors pointer-events-none"><span id="span-contract" class="inline-block h-4 w-4 transform rounded-full bg-white transition shadow-sm translate-x-1"></span></button>
                            </div>

                            <div onclick="toggleSwitch('car')" class="flex items-center justify-between p-3.5 md:p-4 bg-slate-50 rounded-xl border border-slate-200 cursor-pointer hover:border-slate-300 transition-all">
                                <span class="text-sm font-semibold text-slate-700 select-none">Auto Disponibile</span>
                                <button id="btn-car" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-300 transition-colors pointer-events-none"><span id="span-car" class="inline-block h-4 w-4 transform rounded-full bg-white transition shadow-sm translate-x-1"></span></button>
                            </div>

                            <div class="flex flex-col gap-3 pt-2">
                                <button id="btn-submit" onclick="gestisciLavoratore()" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-3.5 md:py-4 rounded-xl shadow-lg transition-all active:scale-[0.98] text-sm">REGISTRA DIPENDENTE</button>
                                <button id="btn-cancel" onclick="annullaModifica()" class="hidden w-full bg-white border border-slate-300 text-slate-700 font-bold py-3 rounded-xl transition-all text-xs">ANNULLA MODIFICA</button>
                                <button onclick="resetTotale()" class="w-full bg-white border border-rose-200 text-rose-600 font-bold py-3 rounded-xl transition-all text-xs">RIPRISTINA DEFAULT</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-8 space-y-4 md:space-y-6">
                    <h2 class="text-xs md:text-sm font-bold text-slate-400 uppercase tracking-widest ml-1">Organico Attivo</h2>
                    <div class="flex flex-col gap-3" id="worker-list-container"></div>
                </div>
            </div>
        </div>

        <div id="tab-pianificazione" class="hidden space-y-6 md:space-y-10 animate-fade">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-0 overflow-hidden">
                <div class="md:p-8 md:border-b md:border-slate-100 flex justify-between items-start md:items-center mb-6 md:mb-0">
                    <div>
                        <h2 class="text-lg md:text-xl font-bold text-slate-900">Disponibilità</h2>
                        <p class="text-xs md:text-sm text-slate-500 mt-1">Configura la presenza settimanale.</p>
                    </div>
                    
                    <div class="hidden md:flex gap-3">
                        <button onclick="resetDisponibilita()" class="bg-white border border-rose-200 text-rose-600 hover:bg-rose-50 px-4 py-2.5 rounded-lg font-bold transition-all shadow-sm flex items-center gap-2 text-xs">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg> RESET MATRICE
                        </button>
                        <button onclick="trovaSoluzioneOttimale()" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-bold hover:bg-blue-700 transition-all shadow-md shadow-blue-100 flex items-center gap-2 text-xs">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> CALCOLA TURNI
                        </button>
                    </div>

                    <button onclick="resetDisponibilita()" class="md:hidden bg-white border border-rose-200 text-rose-600 px-3 py-2 rounded-lg font-bold transition-all text-[10px] uppercase flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg> Reset
                    </button>
                </div>
                
                <div class="grid grid-cols-1 gap-4 md:hidden" id="availability-cards-container"></div>
                
                <div class="hidden md:block overflow-x-auto w-full" id="availability-table-container"></div>
            </div>

            <div id="results-section" class="hidden space-y-6">
                
                <div class="bg-white rounded-2xl p-5 md:p-6 border border-slate-200 shadow-sm mt-8">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Riepilogo Frequenza Turni</h3>
                    <div id="summary-body" class="flex flex-col sm:flex-row flex-wrap gap-2 md:gap-3"></div>
                </div>

                <div class="flex justify-between items-center ml-1">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Output Pianificazione</h2>
                    <button onclick="copiaWhatsApp()" class="bg-[#25D366] hover:bg-[#128C7E] text-white font-bold text-xs px-4 py-2.5 rounded-lg shadow-md transition-all flex items-center gap-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Copia
                    </button>
                </div>

                <div class="grid grid-cols-1 gap-4 md:hidden" id="results-cards-container"></div>

                <div class="hidden md:block bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden" id="results-table-container">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-bold tracking-widest border-b border-slate-200">
                            <tr>
                                <th class="p-5 text-left w-32">Giorno</th>
                                <th class="p-5 text-left">Assegnazioni</th>
                                <th class="p-5 text-left bg-slate-50/50">Riserve & Esclusi</th>
                            </tr>
                        </thead>
                        <tbody id="calendario-table-body" class="divide-y divide-slate-200"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </main>

    <div id="mobile-action-bar" class="md:hidden hidden fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-slate-200 shadow-[0_-4px_15px_-5px_rgba(0,0,0,0.1)] z-50 animate-fade">
        <button onclick="trovaSoluzioneOttimale()" class="w-full bg-blue-600 text-white px-6 py-3.5 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2 text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            CALCOLA TURNI
        </button>
    </div>

    <div id="toast" class="fixed top-20 md:top-auto md:bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl text-sm font-bold opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex items-center gap-2">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> Copiato!
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
